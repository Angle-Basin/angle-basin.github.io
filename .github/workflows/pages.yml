name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Assert published bundle exists (not dev index.html)
        run: |
          test -f dist/index.html || (echo "missing dist/index.html" && exit 1)
          grep -qE '\./assets/[^" ]+\.js' dist/index.html || (echo "dist/index.html missing hashed ./assets/*.js bundle" ; cat dist/index.html | grep script || true; exit 1)
          grep -q '/src/' dist/index.html && (echo "dist/index.html still references dev /src/" ; exit 1) || true
          ls -la dist/assets/*.js | head -5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
