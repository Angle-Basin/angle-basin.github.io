<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Angle Basin</title>
    <meta
      name="description"
      content="Angle Basin — ambient techno from Rochester, NY. Debut album Eigengrau, August 7, 2026. Music and merch on Bandcamp."
    />
    <meta name="theme-color" content="#0a0a0c" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Angle Basin" />
    <meta
      property="og:description"
      content="Ambient techno from Rochester, NY. Eigengrau — 7 August 2026 · Bandcamp Friday."
    />
    <meta property="og:image" content="https://anglebas.in/images/og.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Angle Basin — gritty black and white sparkle texture with logotype in the corner." />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://anglebas.in/images/og.png" />
    <meta
      name="twitter:image:alt"
      content="Angle Basin — gritty black and white texture with lowercase logotype in the lower right corner."
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      body {
        background: #0a0a0c;
        color: #c8c0d0;
        font-family: "SF Mono", "Fira Code", "Consolas", monospace;
        cursor: crosshair;
      }
      canvas {
        display: block;
        position: fixed;
        top: 0;
        left: 0;
      }
      #overlay {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding-bottom: max(8vh, calc(env(safe-area-inset-bottom, 0px) + 1.5rem));
        pointer-events: none;
        z-index: 10;
        background: linear-gradient(transparent 0%, rgba(10, 10, 12, 0.6) 40%, rgba(10, 10, 12, 0.85) 100%);
        padding-top: max(6vh, env(safe-area-inset-top, 0px));
      }
      #title {
        font-size: clamp(11px, 2.8vw, 12px);
        letter-spacing: 0.45em;
        text-transform: uppercase;
        opacity: 0.55;
        margin-bottom: 2.5em;
      }
      #links {
        display: flex;
        gap: 4em;
        pointer-events: auto;
      }
      #links a {
        font-size: clamp(10px, 2.6vw, 11px);
        letter-spacing: 0.35em;
        text-transform: lowercase;
        text-decoration: none;
        color: #c8c0d0;
        opacity: 0.4;
        transition: opacity 0.8s ease;
        padding: 0.85em 0.5em;
        margin: -0.85em -0.5em;
        -webkit-tap-highlight-color: transparent;
      }
      #links a:hover {
        opacity: 0.8;
      }
      #links a:focus-visible {
        opacity: 0.85;
        outline: 1px solid rgba(200, 192, 208, 0.45);
        outline-offset: 6px;
      }
    </style>
  </head>
  <body>
    <div id="overlay">
      <div id="title">angle basin</div>
      <nav id="links">
        <a href="https://anglebasin.bandcamp.com/album/eigengrau" rel="noopener noreferrer">music</a>
        <a href="https://anglebasin.bandcamp.com/merch" rel="noopener noreferrer">merch</a>
      </nav>
    </div>
    <script type="module" src="/src/landing/main.ts"></script>
  </body>
</html>
